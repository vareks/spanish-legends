<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spanish Legends — Boxing Talents Fight Night</title>
  <style>
    :root {
      --gold: #c79a18;
      --gold-2: #f7df82;
      --gold-soft: rgba(199, 154, 24, 0.2);
      --red: #d41111;
      --red-soft: rgba(212, 17, 17, 0.22);
      --ink: #050505;
      --panel: #101010;
      --panel-2: #151515;
      --panel-3: #1a1a1a;
      --line: rgba(255,255,255,.1);
      --text: #f8f2e6;
      --muted: #c8bca0;
      --success: #55b578;
      --danger: #ff7c7c;
      --shadow: 0 26px 58px rgba(0,0,0,.42);
      --radius: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(212, 17, 17, .16), transparent 20%),
        radial-gradient(circle at 88% 8%, rgba(199, 154, 24, .16), transparent 24%),
        linear-gradient(180deg, #050505, #101010 44%, #070707 100%);
      letter-spacing: .1px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .12;
      background-image:
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
      background-size: 100% 32px, 32px 100%;
      mask-image: linear-gradient(180deg, rgba(0,0,0,.92), rgba(0,0,0,.45));
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, transparent 0 8%, rgba(181,20,47,.16) 8% 8.4%, transparent 8.4% 15%, rgba(201,168,76,.16) 15% 15.4%, transparent 15.4% 100%);
      opacity: .55;
      mix-blend-mode: screen;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      flex-wrap: wrap;
      padding-bottom: 16px;
    }

    .eyebrow,
    .label,
    .micro-copy {
      text-transform: uppercase;
      letter-spacing: .22em;
      font-size: 11px;
      color: var(--muted);
    }

    .page-title,
    .hero-title,
    .section-title,
    .fighter-name,
    .event-name,
    .match-vs,
    .champion-name {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .page-title {
      font-size: clamp(32px, 5vw, 48px);
      line-height: .95;
    }

    .page-title span,
    .hero-title span,
    .section-title span,
    .champion-name span {
      color: var(--gold-2);
    }

    .tabs,
    .cta-group,
    .hero-actions,
    .fighter-badges,
    .brand-row,
    .item-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button,
    .cta,
    .tab {
      appearance: none;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      color: var(--text);
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }

    button:hover,
    .cta:hover,
    .tab:hover { transform: translateY(-1px); }

    .cta,
    .tab.active,
    button:not(.secondary):not(.ghost) {
      background: linear-gradient(180deg, var(--gold-2), var(--gold));
      color: #17120a;
      border-color: #8f722e;
    }

    .secondary,
    .ghost,
    .tab.secondary {
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      color: var(--text);
      border-color: rgba(255,255,255,.08);
    }

    .hero {
      position: relative;
      padding: 34px;
      border-radius: calc(var(--radius) + 8px);
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,.05), transparent 30%),
        linear-gradient(180deg, rgba(212,17,17,.22), rgba(212,17,17,0) 28%),
        radial-gradient(circle at 82% 16%, rgba(199,154,24,.22), transparent 24%),
        linear-gradient(145deg, #171717 0%, #0d0d0d 46%, #141414 100%);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .hero::after {
      content: "SEMIFINALES";
      position: absolute;
      right: -18px;
      bottom: -18px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(68px, 14vw, 160px);
      line-height: .9;
      color: rgba(255,255,255,.03);
      pointer-events: none;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: calc(var(--radius) + 4px);
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, .8fr);
      gap: 24px;
      align-items: end;
    }

    .hero-copy { max-width: 720px; }

    .hero-title {
      font-size: clamp(54px, 9vw, 112px);
      line-height: .82;
      margin: 10px 0 12px;
      text-shadow: 0 4px 18px rgba(0,0,0,.38);
    }

    .hero-description {
      max-width: 62ch;
      color: #d9ceb0;
      line-height: 1.6;
      font-size: 15px;
    }

    .hero-actions { margin-top: 18px; }

    .hero-badges,
    .fighter-badge,
    .event-badge,
    .round-title,
    .status-chip,
    .brand-pill,
    .belt-mark {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      padding: 7px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .14em;
      font-weight: 700;
    }

    .belt-mark,
    .round-title,
    .hero-badge--gold,
    .fighter-badge--gold {
      color: #1c1407;
      background: linear-gradient(180deg, #fff0a8, var(--gold-2) 35%, var(--gold));
      border-color: #8f722e;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 8px 18px rgba(0,0,0,.22);
    }

    .hero-badge--dark,
    .fighter-badge,
    .event-badge,
    .brand-pill,
    .status-chip {
      color: #eadfbe;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    }

    .hero-side {
      display: grid;
      gap: 16px;
    }

    .hero-poster,
    .promo-card,
    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
        linear-gradient(180deg, var(--panel-3), var(--panel));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: var(--shadow);
    }

    .hero-poster {
      min-height: 260px;
      padding: 22px;
      display: grid;
      align-content: end;
      background:
        linear-gradient(180deg, rgba(0,0,0,.12), rgba(0,0,0,.74)),
        linear-gradient(90deg, rgba(212,17,17,.78) 0 22%, rgba(212,17,17,0) 22%),
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.12), transparent 20%),
        linear-gradient(180deg, #2a2a2a 0%, #111 100%);
    }

    .poster-kicker { color: #f3df9f; font-size: 12px; text-transform: uppercase; letter-spacing: .18em; }
    .poster-title { font-size: clamp(28px, 5vw, 44px); line-height: .92; }
    .poster-subtitle { color: #d8ccb0; max-width: 28ch; line-height: 1.5; }

    .promo-card {
      padding: 18px;
      display: grid;
      gap: 10px;
      background:
        linear-gradient(180deg, rgba(212,17,17,.18), rgba(255,255,255,.02)),
        linear-gradient(180deg, #181818, #101010);
      border-left: 6px solid var(--red);
    }

    .promo-card strong { font-size: 18px; }
    .promo-card p { color: #d8ccb2; line-height: 1.55; }

    .impact-strip {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .impact-pill {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
    }

    .impact-pill strong {
      display: block;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 22px;
      line-height: .9;
      color: var(--gold-2);
    }

    .impact-pill span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      padding: 22px;
      min-height: 142px;
      display: grid;
      gap: 10px;
      align-content: end;
    }

    .stat-number {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      line-height: .9;
      color: var(--gold-2);
    }

    .stat-copy { color: var(--muted); line-height: 1.5; font-size: 14px; }

    .section { margin-top: 28px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: end;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .section-title {
      font-size: clamp(30px, 5vw, 44px);
      line-height: .92;
    }

    .section-copy {
      color: var(--muted);
      max-width: 62ch;
      line-height: 1.6;
      font-size: 14px;
    }

    .grid { display: grid; gap: 18px; }
    .fighters-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .events-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .list { display: grid; gap: 12px; }

    .card { padding: 18px; }

    .fighter-card {
      display: grid;
      gap: 0;
      min-height: 100%;
      padding: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        linear-gradient(180deg, #181818, #111111);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 14px 26px rgba(0,0,0,.22);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .fighter-card:hover {
      transform: translateY(-3px);
      border-color: rgba(199,154,24,.38);
      box-shadow: 0 18px 30px rgba(0,0,0,.28);
    }

    .fighter-card.is-selected {
      border-color: rgba(199,154,24,.55);
      box-shadow: 0 0 0 1px rgba(199,154,24,.18), 0 18px 30px rgba(0,0,0,.28);
    }

    .fighter-hero {
      position: relative;
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 14px;
      align-items: start;
      padding: 14px;
      background:
        linear-gradient(180deg, rgba(212,17,17,.12), rgba(212,17,17,0) 26%),
        linear-gradient(180deg, #1d1d1d, #151515);
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .fighter-photo {
      width: 96px;
      height: 122px;
      border-radius: 10px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.1);
      background: #1c1c1c;
      box-shadow: 0 10px 20px rgba(0,0,0,.22);
    }

    .fighter-name {
      font-size: 28px;
      line-height: .9;
      color: #f5ecda;
    }

    .fighter-card .fighter-meta,
    .fighter-card .record {
      color: #b9ab8c;
    }

    .fighter-meta,
    .record,
    .event-meta,
    .round-subtitle,
    .match-note,
    .empty-state,
    footer,
    .form-help,
    .err,
    .ok { font-size: 14px; line-height: 1.55; color: var(--muted); }

    .fighter-record {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0;
      background: #121212;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .fighter-stat {
      padding: 12px 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border-right: 1px solid rgba(255,255,255,.06);
      text-align: center;
    }

    .fighter-stat:last-child { border-right: 0; }

    .fighter-stat strong {
      display: block;
      font-family: Inter, system-ui, sans-serif;
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
      color: var(--gold-2);
    }

    .fighter-stat span {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #8f8368;
    }

    .fighter-table {
      display: grid;
      background: #151515;
    }

    .fighter-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 12px;
      padding: 10px 14px;
      border-top: 1px solid rgba(255,255,255,.06);
      font-size: 13px;
      color: #dbd0b8;
    }

    .fighter-row dt {
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8f8368;
    }

    .fighter-row dd {
      margin: 0;
      font-weight: 600;
      color: #f3ead7;
    }

    .fighter-profile-panel {
      display: grid;
      grid-template-columns: minmax(220px, 280px) 1fr;
      gap: 18px;
      align-items: start;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(212,17,17,.08), rgba(212,17,17,0) 24%),
        linear-gradient(180deg, #171717, #101010);
    }

    .fighter-profile-photo {
      width: 100%;
      aspect-ratio: 0.82;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.1);
      background: #181818;
    }

    .fighter-profile-panel h3 {
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: clamp(32px, 5vw, 46px);
      line-height: .9;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }

    .fighter-profile-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .fighter-profile-item {
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
    }

    .fighter-profile-item span {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #8f8368;
      margin-bottom: 6px;
    }

    .fighter-profile-item strong {
      font-size: 15px;
      color: #f3ead7;
    }

    .event-card {
      min-height: 100%;
      display: grid;
      gap: 14px;
      padding: 20px;
    }

    .event-name { font-size: 30px; line-height: .95; }

    .event-line {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .bracket-shell {
      padding: 0;
      overflow: hidden;
      background: #f5f2eb;
      border: 1px solid #d8cfbf;
      box-shadow: 0 18px 32px rgba(0,0,0,.18);
    }

    .bracket-meta {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      padding: 18px 22px 10px;
      color: #221c13;
    }

    .bracket-name {
      font-family: Inter, system-ui, sans-serif;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: #15120e;
    }

    .bracket-subcopy {
      color: #5b5245;
      line-height: 1.5;
      max-width: 62ch;
    }

    .bracket-graphic {
      overflow-x: auto;
      padding: 0 0 18px;
    }

    .bracket-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(210px, 1fr);
      gap: 0;
      min-width: max-content;
      align-items: start;
      padding: 0 10px 18px;
    }

    .round-col {
      position: relative;
      display: grid;
      gap: var(--match-gap, 42px);
      padding: var(--round-offset, 18px) 10px 0;
      min-width: 210px;
    }

    .round-col::after {
      content: "";
      position: absolute;
      top: 76px;
      right: -1px;
      width: 2px;
      height: calc(100% - 92px);
      background: #1d1d1d;
      opacity: .85;
    }

    .round-col:last-child::after,
    .round-col.champion-col::after { display: none; }

    .round-title {
      display: block;
      width: calc(100% + 20px);
      margin: 0 -10px 8px;
      padding: 8px 10px;
      border-radius: 0;
      text-align: left;
      font-family: Inter, system-ui, sans-serif;
      font-size: 12px;
      letter-spacing: .03em;
      background: linear-gradient(180deg, #d7b342, #caa22e);
      color: #16120b;
      box-shadow: none;
      border: 0;
    }

    .round-subtitle {
      font-size: 11px;
      margin-top: -2px;
      color: #6b6358;
      padding-left: 2px;
    }

    .match-card {
      position: relative;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
    }

    .match-card::before {
      content: "";
      position: absolute;
      right: -16px;
      top: 50%;
      width: 16px;
      height: 2px;
      background: #1f1f1f;
      transform: translateY(-50%);
    }

    .match-card::after { display: none; }

    .round-col:last-child .match-card::before,
    .champion-col .match-card::before { display: none; }

    .match-topline,
    .champion-card,
    .admin-shell,
    .form-grid {
      display: grid;
      gap: 12px;
    }

    .match-topline {
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 8px;
      padding: 0 2px;
    }

    .match-vs {
      font-size: 16px;
      line-height: 1;
      color: #16120b;
      font-family: Inter, system-ui, sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .fighter-slot {
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 12px 12px;
      min-height: 44px;
      border-radius: 0;
      border: 2px solid #1c1c1c;
      background: #fffdfa;
      color: #1b1712;
      box-shadow: none;
      display: grid;
    }

    .fighter-slot + .fighter-slot { margin-top: 8px; }

    .fighter-slot.winner {
      border-color: #1c1c1c;
      background: #fffdfa;
    }

    .fighter-slot.pending {
      opacity: 1;
    }

    .slot-photo { display: none; }

    .slot-name {
      font-weight: 700;
      font-size: 14px;
      color: #1f1a13;
    }

    .slot-name-link {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      margin: 0;
      font: inherit;
      font-weight: inherit;
      color: inherit;
      cursor: pointer;
      text-align: left;
      transition: color .18s ease, opacity .18s ease;
    }

    .slot-name-link:hover,
    .slot-name-link:focus-visible {
      color: #8f722e;
      outline: none;
    }

    .slot-meta {
      font-size: 11px;
      letter-spacing: 0;
      color: #4c4438;
      margin-top: 2px;
      text-transform: none;
    }

    .slot-seed,
    .winner-chip {
      justify-self: end;
      border-radius: 0;
      padding: 0;
      font-size: 13px;
      letter-spacing: 0;
      font-weight: 700;
      border: 0;
      color: #222;
      background: transparent;
    }

    .winner-chip {
      color: #222;
      background: transparent;
    }

    .champion-col {
      min-width: 230px;
      align-self: start;
      padding-top: 18px;
    }

    .champion-card {
      align-content: center;
      justify-items: center;
      gap: 14px;
      min-height: 320px;
      padding: 20px 14px;
      border-radius: 0;
      background: #fffdfa;
      border: 2px solid #1d1d1d;
      box-shadow: none;
    }

    .bracket-medal {
      width: 104px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff7c9, #e4c152 40%, #b98717 72%, #7d5d12 100%);
      border: 6px solid #d7b342;
      box-shadow: inset 0 0 0 3px rgba(255,255,255,.35), 0 10px 18px rgba(0,0,0,.12);
      position: relative;
    }

    .bracket-medal::before {
      content: "BOXING\A TALENTS";
      white-space: pre;
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      font-size: 22px;
      line-height: .9;
      color: rgba(128, 90, 9, .9);
      text-align: center;
    }

    .champion-card img { display: none; }

    .champion-name {
      font-size: 26px;
      line-height: .95;
      text-align: center;
      color: #1f180d;
    }

    .champion-copy {
      text-align: center;
      color: #433724;
      line-height: 1.5;
      font-size: 14px;
      font-weight: 700;
    }

    .empty-state {
      padding: 22px;
      border-radius: 18px;
      border: 1px dashed rgba(255,255,255,.14);
      background: rgba(255,255,255,.02);
    }

    .admin-shell {
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .admin-menu { display: grid; gap: 10px; }

    .admin-panel h3 {
      margin-bottom: 12px;
      font-size: 24px;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    form { display: grid; gap: 12px; margin-bottom: 16px; }

    .form-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    input,
    select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 13px 14px;
      background: #0d0d0d;
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: rgba(201,168,76,.5);
      box-shadow: 0 0 0 3px rgba(201,168,76,.12);
    }

    select[multiple] { min-height: 180px; }

    .err { color: var(--danger); }
    .ok { color: var(--success); }
    .match { border-top: 1px dashed rgba(255,255,255,.08); padding-top: 14px; margin-top: 14px; }

    footer {
      padding: 32px 0 18px;
      text-align: center;
      color: #817864;
    }

    @media (max-width: 1100px) {
      .hero-grid,
      .admin-shell {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .wrap { padding: 18px; }
      .hero { padding: 24px; }
      .fighter-hero { grid-template-columns: 88px 1fr; }
      .fighter-photo { width: 88px; height: 120px; }
      .fighter-record { grid-template-columns: repeat(2, 1fr); }
      .fighter-slot { grid-template-columns: 46px 1fr; }
      .slot-seed,
      .winner-chip { grid-column: 2; justify-self: start; }
      .slot-photo { width: 46px; height: 46px; border-radius: 12px; }
      .bracket-grid { grid-auto-columns: minmax(190px, 1fr); }
      .round-col,
      .champion-col { min-width: 190px; }
      .impact-strip,
      .fighter-profile-grid { grid-template-columns: 1fr; }
      .fighter-profile-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="app"></div>

  <script>
    const WEIGHT_CLASSES = [
      { key: 'Peso Mosca', min: 0, max: 50.8 },
      { key: 'Peso Gallo', min: 50.9, max: 53.5 },
      { key: 'Peso Pluma', min: 53.6, max: 57.1 },
      { key: 'Peso Ligero', min: 57.2, max: 61.2 },
      { key: 'Peso Welter', min: 61.3, max: 66.7 },
      { key: 'Peso Medio', min: 66.8, max: 72.6 },
      { key: 'Peso Semipesado', min: 72.7, max: 79.4 },
      { key: 'Peso Pesado', min: 79.5, max: 130 }
    ];

    const storageKey = 'boxing-talents-mvp1';
    let editRefs = { fighterId: null, eventId: null };

    function uid() {
      return crypto.randomUUID();
    }

    function createDefaultFighters() {
      return [
        { id: uid(), name: 'Carlos Mendoza', city: 'Vigo', gym: 'La Vieja Escuela', category: 'Peso Welter', weight: 66.2, wins: 18, losses: 2, draws: 0, kos: 14, photo: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=720&q=80' },
        { id: uid(), name: 'Danny Reyes', city: 'Madrid', gym: 'Puño Norte', category: 'Peso Ligero', weight: 60.4, wins: 16, losses: 1, draws: 1, kos: 9, photo: 'https://images.unsplash.com/photo-1517430816045-df4b7de11d1d?auto=format&fit=crop&w=720&q=80' },
        { id: uid(), name: 'Iván Cortés', city: 'Sevilla', gym: 'South Ring', category: 'Peso Medio', weight: 71.8, wins: 13, losses: 0, draws: 0, kos: 8, photo: 'https://images.unsplash.com/photo-1544717305-2782549b5136?auto=format&fit=crop&w=720&q=80' },
        { id: uid(), name: 'Leo Vargas', city: 'Bilbao', gym: 'Old School Gym', category: 'Peso Pluma', weight: 56.8, wins: 20, losses: 3, draws: 0, kos: 11, photo: 'https://images.unsplash.com/photo-1566753323558-f4e0952af115?auto=format&fit=crop&w=720&q=80' }
      ];
    }

    function getRoundName(size, fallback = 'Ronda inicial') {
      const labels = {
        2: 'Final',
        4: 'Semifinal',
        8: 'Cuartosfinal',
        16: 'Octavosfinal'
      };
      return labels[size] || fallback;
    }

    function nextPowerOfTwo(value) {
      let size = 2;
      while (size < value) size *= 2;
      return size;
    }

    function createMatch(fighter1Id = null, fighter2Id = null, seed1 = '', seed2 = '') {
      const hasSingleFighter = Boolean(fighter1Id) !== Boolean(fighter2Id);
      const autoWinner = fighter1Id || fighter2Id || null;
      return {
        fighter1Id,
        fighter2Id,
        winnerId: hasSingleFighter ? autoWinner : null,
        method: hasSingleFighter ? 'Bye' : 'Pendiente',
        scheduled: null,
        seed1,
        seed2
      };
    }

    function buildBracketRounds(participants, firstRoundName) {
      const safeParticipants = participants.filter(Boolean);
      const bracketSize = nextPowerOfTwo(Math.max(2, safeParticipants.length));
      const rounds = [];
      const initialSlots = new Array(bracketSize).fill(null);
      safeParticipants.forEach((fighterId, index) => {
        initialSlots[index] = fighterId;
      });

      let currentSlots = initialSlots;
      let roundSize = bracketSize;
      let roundIndex = 0;

      while (roundSize >= 2) {
        const matches = [];
        for (let i = 0; i < currentSlots.length; i += 2) {
          matches.push(createMatch(
            currentSlots[i] || null,
            currentSlots[i + 1] || null,
            roundIndex === 0 ? String(i + 1) : '',
            roundIndex === 0 ? String(i + 2) : ''
          ));
        }

        rounds.push({
          name: roundIndex === 0 ? getRoundName(roundSize, firstRoundName || `Ronda ${roundIndex + 1}`) : getRoundName(roundSize, `Ronda ${roundIndex + 1}`),
          matches
        });

        currentSlots = new Array(Math.ceil(currentSlots.length / 2)).fill(null);
        roundSize = currentSlots.length;
        roundIndex += 1;
      }

      return rounds;
    }

    function createDemoBracket(fighters) {
      const participants = fighters.slice(0, 4).map(f => f.id);
      const rounds = buildBracketRounds(participants, 'Semifinal');

      if (rounds[0]?.matches[0]) {
        rounds[0].matches[0].winnerId = fighters[0].id;
        rounds[0].matches[0].method = 'TKO · R2';
        rounds[0].matches[0].scheduled = '21:00';
      }
      if (rounds[0]?.matches[1]) {
        rounds[0].matches[1].winnerId = fighters[2].id;
        rounds[0].matches[1].method = 'UD · 3-0';
        rounds[0].matches[1].scheduled = '21:45';
      }
      propagateBracketForward(rounds, 0);
      if (rounds[1]?.matches[0]) {
        rounds[1].matches[0].scheduled = '23:00';
      }

      return {
        id: uid(),
        name: 'Boxing Talents Grand Prix',
        season: '2026',
        venue: 'Madrid Fight Dome',
        isActive: true,
        rounds,
        participantCount: participants.length,
        bracketSize: nextPowerOfTwo(participants.length)
      };
    }

    function createDefaultState() {
      const fighters = createDefaultFighters();
      const events = [
        { id: uid(), name: 'Night of Talents', date: '2026-05-12', venue: 'Madrid Arena', status: 'Programado' },
        { id: uid(), name: 'Golden Gloves', date: '2026-06-01', venue: 'Bilbao Coliseum', status: 'Abierto' }
      ];

      return {
        ui: { activeTab: 'public', adminSection: 'fighters', isAdmin: false, selectedFighterId: null },
        adminPass: 'boxing123',
        fighters,
        events,
        brackets: [createDemoBracket(fighters)]
      };
    }

    function placeholderPhoto(name) {
      return `https://placehold.co/320x380/141414/F8F2DF?text=${encodeURIComponent(name || 'Boxeador')}`;
    }

    function normalizeRounds(rounds) {
      if (!Array.isArray(rounds) || rounds.length === 0) return [];
      return rounds.map((round, roundIndex) => ({
        name: round?.name || getRoundName(Math.pow(2, Math.max(rounds.length - roundIndex, 1)), `Ronda ${roundIndex + 1}`),
        matches: Array.isArray(round?.matches)
          ? round.matches.map(match => ({
              fighter1Id: match?.fighter1Id || null,
              fighter2Id: match?.fighter2Id || null,
              winnerId: match?.winnerId || null,
              method: match?.method || 'Pendiente',
              scheduled: match?.scheduled || null,
              seed1: match?.seed1 || '',
              seed2: match?.seed2 || ''
            }))
          : []
      }));
    }

    function enrichBracket(bracket, fallbackFighters) {
      const participants = fallbackFighters.slice(0, Math.max(2, Math.min(8, fallbackFighters.length))).map(f => f.id);
      const rounds = normalizeRounds(bracket?.rounds);
      const safeRounds = rounds.length ? rounds : buildBracketRounds(participants, getRoundName(nextPowerOfTwo(participants.length)));
      propagateBracketForward(safeRounds, 0);

      const participantCount = bracket?.participantCount || new Set((safeRounds[0]?.matches || []).flatMap(match => [match.fighter1Id, match.fighter2Id]).filter(Boolean)).size;
      return {
        id: bracket?.id || uid(),
        name: bracket?.name || 'Boxing Talents Grand Prix',
        season: bracket?.season || '2026',
        venue: bracket?.venue || 'Rockanbox Arena',
        isActive: bracket?.isActive !== false,
        rounds: safeRounds,
        participantCount,
        bracketSize: bracket?.bracketSize || nextPowerOfTwo(Math.max(2, participantCount))
      };
    }

    function loadState() {
      const base = createDefaultState();
      try {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return structuredClone(base);
        const parsed = JSON.parse(raw);
        const fighters = (parsed.fighters?.length ? parsed.fighters : base.fighters).map(f => ({
          ...f,
          photo: f.photo || placeholderPhoto(f.name)
        }));
        const brackets = parsed.brackets?.length
          ? parsed.brackets.map(b => enrichBracket(b, fighters))
          : base.brackets.map(b => enrichBracket(b, fighters));

        return {
          ...base,
          ...parsed,
          fighters,
          events: parsed.events?.length ? parsed.events : base.events,
          brackets,
          ui: { ...base.ui, ...(parsed.ui || {}), isAdmin: false, selectedFighterId: (parsed.ui && parsed.ui.selectedFighterId) || null }
        };
      } catch {
        return structuredClone(base);
      }
    }

    let state = loadState();

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify({ ...state, ui: { ...state.ui, isAdmin: false } }));
    }

    function setState(updater) {
      state = updater(state);
      saveState();
      render();
    }

    function categoryOptions(selected) {
      return WEIGHT_CLASSES.map(c => `<option value="${c.key}" ${c.key === selected ? 'selected' : ''}>${c.key}</option>`).join('');
    }

    function findWeightClass(key) {
      return WEIGHT_CLASSES.find(c => c.key === key);
    }

    function fighterById(id) {
      return state.fighters.find(f => f.id === id) || null;
    }

    function validateFighter(payload) {
      const required = ['name', 'city', 'gym', 'category'];
      for (const field of required) if (!payload[field]) return `${field} es obligatorio`;
      if (!payload.photo) return 'La foto es obligatoria';
      const weight = Number(payload.weight);
      if (!Number.isFinite(weight) || weight <= 0) return 'Peso inválido';
      const klass = findWeightClass(payload.category);
      if (!klass) return 'Categoría inválida';
      if (weight < klass.min || weight > klass.max) {
        return `Peso incoherente para ${klass.key} (${klass.min}kg-${klass.max}kg)`;
      }
      return null;
    }

    function validateEvent(payload) {
      if (!payload.name || !payload.venue || !payload.status || !payload.date) return 'Todos los campos de evento son obligatorios';
      const date = new Date(payload.date + 'T00:00:00');
      if (Number.isNaN(date.getTime())) return 'Fecha inválida';
      return null;
    }

    function validateRoundSize(participants) {
      if (participants.length < 2) {
        return 'Se requieren al menos 2 participantes para crear el bracket';
      }
      if (participants.length > 8) {
        return 'Por ahora el bracket soporta entre 2 y 8 participantes';
      }
      if (new Set(participants).size !== participants.length) {
        return 'No puedes repetir el mismo boxeador dentro del bracket';
      }
      return null;
    }

    function fighterIsUsedInBrackets(fighterId, brackets = state.brackets) {
      return brackets.some(bracket => bracket.rounds?.some(round => round.matches?.some(match => (
        match.fighter1Id === fighterId || match.fighter2Id === fighterId || match.winnerId === fighterId
      ))));
    }

    function toDateOnly(value) {
      const date = new Date(value + 'T00:00:00');
      if (Number.isNaN(date.getTime())) return null;
      return date;
    }

    function getTodayDateOnly() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }

    function getUpcomingEvents(events) {
      const today = getTodayDateOnly();
      return events
        .filter(e => {
          const date = toDateOnly(e.date);
          return date && date >= today;
        })
        .sort((a, b) => toDateOnly(a.date) - toDateOnly(b.date));
    }

    function getActiveBracket(brackets) {
      return brackets.find(b => b.isActive) || null;
    }

    function normalizeMatchWinner(match) {
      if (!match) return null;
      const hasFighter1 = Boolean(match.fighter1Id);
      const hasFighter2 = Boolean(match.fighter2Id);

      if (match.winnerId && match.winnerId !== match.fighter1Id && match.winnerId !== match.fighter2Id) {
        match.winnerId = null;
      }

      if (hasFighter1 && !hasFighter2) {
        match.winnerId = match.fighter1Id;
        if (!match.method || match.method === 'Pendiente') match.method = 'Bye';
      } else if (!hasFighter1 && hasFighter2) {
        match.winnerId = match.fighter2Id;
        if (!match.method || match.method === 'Pendiente') match.method = 'Bye';
      } else if (!hasFighter1 && !hasFighter2) {
        match.winnerId = null;
        match.method = 'Pendiente';
      } else if (!match.winnerId) {
        match.method = 'Pendiente';
      }

      return match.winnerId || null;
    }

    function propagateBracketForward(rounds, fromRoundIndex = 0) {
      if (!Array.isArray(rounds) || !rounds.length) return;

      const startIndex = Math.max(0, fromRoundIndex);
      rounds[startIndex]?.matches?.forEach(match => normalizeMatchWinner(match));

      for (let r = Math.max(1, fromRoundIndex + 1); r < rounds.length; r += 1) {
        const previousRound = rounds[r - 1];
        const currentRound = rounds[r];
        previousRound.matches.forEach(match => normalizeMatchWinner(match));
        currentRound.matches.forEach((match, matchIndex) => {
          const prevMatchA = previousRound.matches[matchIndex * 2] || null;
          const prevMatchB = previousRound.matches[matchIndex * 2 + 1] || null;
          const nextFighter1Id = normalizeMatchWinner(prevMatchA);
          const nextFighter2Id = normalizeMatchWinner(prevMatchB);
          match.fighter1Id = nextFighter1Id || null;
          match.fighter2Id = nextFighter2Id || null;

          if (match.winnerId && match.winnerId !== match.fighter1Id && match.winnerId !== match.fighter2Id) {
            match.winnerId = null;
            match.method = 'Pendiente';
          }

          normalizeMatchWinner(match);
        });
      }
    }

    function updateBracketWinner(bracket, roundIndex, matchIndex, winnerId) {
      const clone = structuredClone(bracket);
      const match = clone.rounds?.[roundIndex]?.matches?.[matchIndex];
      if (!match) return clone;
      match.winnerId = winnerId;
      match.method = roundIndex === clone.rounds.length - 1 ? 'Campeón decidido' : 'Ganador confirmado';
      propagateBracketForward(clone.rounds, roundIndex);
      return clone;
    }

    function getChampion(bracket) {
      if (!bracket?.rounds?.length) return null;
      const finalRound = bracket.rounds[bracket.rounds.length - 1];
      const finalMatch = finalRound?.matches?.[0];
      return finalMatch?.winnerId ? fighterById(finalMatch.winnerId) : null;
    }

    function renderFighterSlot(match, fighterId, slotLabel, isWinner) {
      const fighter = fighterById(fighterId);
      const isBye = !fighterId && slotLabel;
      const slotName = fighter
        ? `<button class="slot-name slot-name-link" type="button" data-action="show-fighter-profile" data-id="${fighter.id}">${fighter.name}</button>`
        : `<div class="slot-name">${isBye ? 'Bye' : 'Pendiente'}</div>`;
      return `
        <div class="fighter-slot ${isWinner ? 'winner' : 'pending'}">
          <div>
            ${slotName}
            <div class="slot-meta">${fighter ? `(${fighter.city} · ${fighter.gym})` : (isBye ? 'Pase automático' : 'Por definir')}</div>
          </div>
          <span class="${isWinner ? 'winner-chip' : 'slot-seed'}">${slotLabel || ''}</span>
        </div>
      `;
    }

    function renderBracketGraphic(bracket) {
      if (!bracket) {
        return '<article class="card bracket-shell"><div class="empty-state">No hay un bracket activo en este momento.</div></article>';
      }

      const champion = getChampion(bracket);
      const boxerCount = bracket.participantCount || new Set((bracket.rounds?.[0]?.matches || []).flatMap(match => [match.fighter1Id, match.fighter2Id]).filter(Boolean)).size;

      return `
        <article class="card bracket-shell">
          <div class="bracket-meta">
            <div>
              <div class="eyebrow">Formato oficial de cuadro</div>
              <div class="bracket-name">${bracket.name}</div>
              <p class="bracket-subcopy">Tablero inspirado en el formato real de la liga: cabeceras limpias, cruces oficiales y final resuelta con cinturón y ganadora destacada.</p>
            </div>
            <div class="brand-row">
              <span class="belt-mark">${champion?.category || 'Spanish Legends'}</span>
              <span class="brand-pill">Nº Boxeadores: ${boxerCount || 0}</span>
            </div>
          </div>
          <div class="bracket-graphic">
            <div class="bracket-grid">
              ${bracket.rounds.map((round, roundIndex) => `
                <section class="round-col" style="--round-offset:${18 + roundIndex * 52}px; --match-gap:${28 + roundIndex * 48}px;">
                  <div>
                    <span class="round-title">${round.name}</span>
                    <p class="round-subtitle">${round.matches.length} cruce${round.matches.length !== 1 ? 's' : ''}</p>
                  </div>
                  ${round.matches.map((match, matchIndex) => {
                    const winnerA = match.winnerId && match.winnerId === match.fighter1Id;
                    const winnerB = match.winnerId && match.winnerId === match.fighter2Id;
                    return `
                      <article class="match-card">
                        <div class="match-topline">
                          <div class="match-vs">Combate ${matchIndex + 1}</div>
                          <span class="status-chip">${match.method || 'Pendiente'}</span>
                        </div>
                        ${renderFighterSlot(match, match.fighter1Id, match.seed1 || '', winnerA)}
                        ${renderFighterSlot(match, match.fighter2Id, match.seed2 || '', winnerB)}
                        <p class="match-note">${match.scheduled ? `Horario · ${match.scheduled}` : (match.method === 'Bye' ? 'Pase automático a la siguiente ronda.' : 'Cuadro pendiente de resolución oficial.')}</p>
                      </article>
                    `;
                  }).join('')}
                </section>
              `).join('')}
              <section class="round-col champion-col">
                <div>
                  <span class="round-title">Final</span>
                  <p class="round-subtitle">Resultado oficial</p>
                </div>
                <article class="champion-card">
                  <div class="bracket-medal"></div>
                  <div class="champion-name">${champion ? champion.name : 'Ganadora pendiente'}</div>
                  <p class="champion-copy">${champion ? `${champion.city} · ${champion.gym} · ${champion.wins}-${champion.losses}-${champion.draws}` : 'La final mostrará aquí a la campeona una vez se cierre el último cruce.'}</p>
                  <div class="brand-row">
                    <span class="belt-mark">Boxing Talents</span>
                    <span class="brand-pill">Campeón</span>
                  </div>
                </article>
              </section>
            </div>
          </div>
        </article>
      `;
    }

    function publicView() {
      const upcomingEvents = getUpcomingEvents(state.events);
      const activeBracket = getActiveBracket(state.brackets);
      const champion = getChampion(activeBracket);
      const selectedFighter = fighterById(state.ui.selectedFighterId) || state.fighters[0] || null;

      return `
        <section class="hero">
          <div class="hero-grid">
            <div class="hero-copy">
              <div class="eyebrow">Viernes 8 mayo · 20:30h · Madrid</div>
              <h2 class="hero-title">SEMIFINALES <span>SPANISH LEGENDS</span></h2>
              <p class="hero-description">Ahora la dirección visual pisa el terreno del cartel que me has pasado: rojo de combate, negro con collage, oro de cinturón y una home que parece anunciar una velada real.</p>
              <div class="hero-actions">
                <a class="cta" href="#bracket">Ver bracket gráfico</a>
                <a class="cta secondary" href="#fighters">Roster</a>
                <a class="cta secondary" href="#events">Eventos</a>
              </div>
              <div class="brand-row" style="margin-top:18px;">
                <span class="belt-mark">Boxing Talents Belt</span>
                <span class="brand-pill">Spanish Legends</span>
                <span class="brand-pill">Combate profesional</span>
              </div>
              <div class="impact-strip">
                <div class="impact-pill"><strong>8 MAYO</strong><span>cartel principal</span></div>
                <div class="impact-pill"><strong>CINTURÓN</strong><span>tensión titular</span></div>
                <div class="impact-pill"><strong>MADRID</strong><span>noche de combate</span></div>
              </div>
            </div>
            <div class="hero-side">
              <article class="hero-poster">
                <div class="poster-kicker">Combate profesional</div>
                <div class="poster-title">BOXING <span style="color:var(--gold-2);">TALENTS</span></div>
                <p class="poster-subtitle">Cinturón al centro, fondo de combate y una lectura visual mucho más cercana al póster de la velada.</p>
              </article>
              <article class="promo-card">
                <div class="eyebrow">Combate destacado</div>
                <strong>${champion ? champion.name : activeBracket?.name || 'Modo campeonato'}</strong>
                <p>${champion ? `Aspirante destacado al cinturón en ${champion.category}, con presencia de combate estelar.` : 'Final pendiente con presencia de gran velada, lista para vender cartelera desde la home.'}</p>
              </article>
            </div>
          </div>
        </section>

        <section class="stats">
          <article class="card stat-card">
            <div class="label">Boxeadores en roster</div>
            <div class="stat-number">${state.fighters.length}</div>
            <p class="stat-copy">Perfiles con presencia de fighter card, récord visible y lectura inmediata de esquina.</p>
          </article>
          <article class="card stat-card">
            <div class="label">Eventos próximos</div>
            <div class="stat-number">${upcomingEvents.length}</div>
            <p class="stat-copy">Calendario listo para anunciar veladas, pesajes y noches de campeonato.</p>
          </article>
          <article class="card stat-card">
            <div class="label">Brackets activos</div>
            <div class="stat-number">${activeBracket ? 1 : 0}</div>
            <p class="stat-copy">Cuadro de torneo con progresión visual y narrativa de combate.</p>
          </article>
        </section>

        <section id="fighters" class="section">
          <div class="section-head">
            <div>
              <div class="eyebrow">Boxeadores</div>
              <h2 class="section-title">Roster de <span>combate</span></h2>
            </div>
            <p class="section-copy">Las fichas empujan más hacia un universo de boxeo real: foto dominante, récord al frente y sensación de póster de presentación.</p>
          </div>
          <div class="grid fighters-grid">
            ${state.fighters.map(f => `
              <article class="card fighter-card ${selectedFighter?.id === f.id ? 'is-selected' : ''}" data-action="show-fighter-profile" data-id="${f.id}">
                <div class="fighter-hero">
                  <img class="fighter-photo" src="${f.photo}" alt="Foto de ${f.name}" loading="lazy" />
                  <div>
                    <div class="fighter-badges">
                      <span class="fighter-badge fighter-badge--gold">${f.category}</span>
                      <span class="fighter-badge">${f.weight} kg</span>
                    </div>
                    <h3 class="fighter-name">${f.name}</h3>
                    <p class="fighter-meta">${f.city} · ${f.gym}</p>
                    <p class="record">Récord profesional · ${f.wins}-${f.losses}-${f.draws} (${f.kos} KO)</p>
                  </div>
                </div>
                <div class="fighter-record">
                  <div class="fighter-stat"><strong>${f.wins}</strong><span>Victorias</span></div>
                  <div class="fighter-stat"><strong>${f.losses}</strong><span>Derrotas</span></div>
                  <div class="fighter-stat"><strong>${f.draws}</strong><span>Nulos</span></div>
                  <div class="fighter-stat"><strong>${f.kos}</strong><span>KOs</span></div>
                </div>
                <dl class="fighter-table">
                  <div class="fighter-row"><dt>Ciudad</dt><dd>${f.city}</dd></div>
                  <div class="fighter-row"><dt>Gimnasio</dt><dd>${f.gym}</dd></div>
                  <div class="fighter-row"><dt>Categoría</dt><dd>${f.category}</dd></div>
                  <div class="fighter-row"><dt>Peso</dt><dd>${f.weight} kg</dd></div>
                </dl>
              </article>
            `).join('')}
          </div>
        </section>

        ${selectedFighter ? `
          <section id="fighter-profile" class="section">
            <div class="section-head">
              <div>
                <div class="eyebrow">Perfil del boxeador</div>
                <h2 class="section-title">${selectedFighter.name.split(' ')[0]} <span>card</span></h2>
              </div>
              <p class="section-copy">Al hacer click en un boxeador, aterrizas en su ficha destacada con sus datos principales y su contexto competitivo.</p>
            </div>
            <article class="card fighter-profile-panel">
              <img class="fighter-profile-photo" src="${selectedFighter.photo}" alt="Foto de ${selectedFighter.name}" loading="lazy" />
              <div>
                <div class="fighter-badges">
                  <span class="fighter-badge fighter-badge--gold">${selectedFighter.category}</span>
                  <span class="fighter-badge">${selectedFighter.weight} kg</span>
                  <span class="fighter-badge">${selectedFighter.kos} KO</span>
                </div>
                <h3>${selectedFighter.name}</h3>
                <p class="section-copy">${selectedFighter.city} · ${selectedFighter.gym} · Récord ${selectedFighter.wins}-${selectedFighter.losses}-${selectedFighter.draws}</p>
                <div class="fighter-profile-grid">
                  <div class="fighter-profile-item"><span>Victorias</span><strong>${selectedFighter.wins}</strong></div>
                  <div class="fighter-profile-item"><span>Derrotas</span><strong>${selectedFighter.losses}</strong></div>
                  <div class="fighter-profile-item"><span>Nulos</span><strong>${selectedFighter.draws}</strong></div>
                  <div class="fighter-profile-item"><span>KOs</span><strong>${selectedFighter.kos}</strong></div>
                  <div class="fighter-profile-item"><span>Ciudad</span><strong>${selectedFighter.city}</strong></div>
                  <div class="fighter-profile-item"><span>Gimnasio</span><strong>${selectedFighter.gym}</strong></div>
                </div>
              </div>
            </article>
          </section>
        ` : ''}

        <section id="events" class="section">
          <div class="section-head">
            <div>
              <div class="eyebrow">Calendario</div>
              <h2 class="section-title">Próxima <span>cartelera</span></h2>
            </div>
            <p class="section-copy">Las veladas se presentan como cartelera: sede, fecha y estado con más tensión visual y menos pinta de dashboard genérico.</p>
          </div>
          ${upcomingEvents.length ? `
            <div class="grid events-grid">
              ${upcomingEvents.map(e => `
                <article class="card event-card">
                  <div class="event-line">
                    <span class="event-badge">${e.status}</span>
                    <span class="micro-copy">${e.date}</span>
                  </div>
                  <h3 class="event-name">${e.name}</h3>
                  <p class="event-meta">${e.venue}</p>
                  <div class="brand-row">
                    <span class="brand-pill">Noche de combate</span>
                    <span class="brand-pill">Boxing Talents</span>
                  </div>
                </article>
              `).join('')}
            </div>
          ` : `
            <article class="card"><p class="empty-state">No hay eventos futuros programados.</p></article>
          `}
        </section>

        <section id="bracket" class="section">
          <div class="section-head">
            <div>
              <div class="eyebrow">Cuadro del torneo</div>
              <h2 class="section-title">Bracket <span>oficial</span></h2>
            </div>
            <p class="section-copy">Refinado para parecer un cuadro oficial de campeonato: columnas de rondas, narrativa de combates y cierre visual de cinturón.</p>
          </div>
          ${renderBracketGraphic(activeBracket)}
        </section>
      `;
    }

    function adminLoginView() {
      return `
        <section class="card">
          <h2 class="section-title">Admin <span>mode</span></h2>
          <p class="section-copy">Introduce la clave local para habilitar el modo admin.</p>
          <form id="admin-login-form">
            <input type="password" name="password" placeholder="Clave admin" required />
            <button type="submit">Entrar al admin</button>
          </form>
          <div id="admin-login-msg" class="err"></div>
        </section>`;
    }

    function fightersModule() {
      const editing = state.fighters.find(f => f.id === editRefs.fighterId);
      return `
        <section class="admin-panel card">
          <h3>Gestión de boxeadores</h3>
          <form id="fighter-form">
            <div class="form-grid">
              <input name="name" placeholder="Nombre" required value="${editing?.name || ''}" />
              <input name="photo" type="url" placeholder="URL de foto" required value="${editing?.photo || ''}" />
              <input name="city" placeholder="Ciudad" required value="${editing?.city || ''}" />
              <input name="gym" placeholder="Gimnasio" required value="${editing?.gym || ''}" />
              <select name="category" required>${categoryOptions(editing?.category || 'Peso Ligero')}</select>
              <input type="number" step="0.1" name="weight" placeholder="Peso (kg)" required value="${editing?.weight ?? ''}" />
              <input type="number" name="wins" min="0" placeholder="Victorias" required value="${editing?.wins ?? 0}" />
              <input type="number" name="losses" min="0" placeholder="Derrotas" required value="${editing?.losses ?? 0}" />
              <input type="number" name="draws" min="0" placeholder="Nulos" required value="${editing?.draws ?? 0}" />
              <input type="number" name="kos" min="0" placeholder="KO" required value="${editing?.kos ?? 0}" />
            </div>
            <button type="submit">${editing ? 'Guardar cambios' : 'Crear boxeador'}</button>
            ${editing ? '<button type="button" class="secondary" id="cancel-fighter-edit">Cancelar edición</button>' : ''}
          </form>
          <div id="fighter-msg"></div>
          <div class="list">
            ${state.fighters.map(f => `
              <article class="card">
                <div class="fighter-hero">
                  <img class="fighter-photo" src="${f.photo}" alt="Foto de ${f.name}" loading="lazy" />
                  <div>
                    <div class="fighter-badges">
                      <span class="fighter-badge fighter-badge--gold">${f.category}</span>
                    </div>
                    <strong>${f.name}</strong>
                    <p class="fighter-meta">${f.city} · ${f.gym} · ${f.weight}kg</p>
                    <p class="record">${f.wins}-${f.losses}-${f.draws} · ${f.kos} KO</p>
                  </div>
                </div>
                <div class="item-actions">
                  <button data-action="edit-fighter" data-id="${f.id}" class="secondary">Editar</button>
                  <button data-action="delete-fighter" data-id="${f.id}">Eliminar</button>
                </div>
              </article>`).join('')}
          </div>
        </section>`;
    }

    function eventsModule() {
      const editing = state.events.find(e => e.id === editRefs.eventId);
      return `
        <section class="admin-panel card">
          <h3>Gestión de eventos</h3>
          <form id="event-form">
            <div class="form-grid">
              <input name="name" required placeholder="Nombre evento" value="${editing?.name || ''}" />
              <input type="date" name="date" required value="${editing?.date || ''}" />
              <input name="venue" required placeholder="Sede" value="${editing?.venue || ''}" />
              <select name="status" required>
                ${['Borrador', 'Programado', 'Abierto', 'Cerrado'].map(s => `<option value="${s}" ${editing?.status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <button type="submit">${editing ? 'Guardar cambios' : 'Crear evento'}</button>
            ${editing ? '<button type="button" class="secondary" id="cancel-event-edit">Cancelar edición</button>' : ''}
          </form>
          <div id="event-msg"></div>
          <div class="list">
            ${state.events.map(e => `
              <article class="card">
                <strong>${e.name}</strong>
                <p class="event-meta">${e.date} · ${e.venue}</p>
                <p><span class="event-badge">${e.status}</span></p>
                <div class="item-actions">
                  <button data-action="edit-event" data-id="${e.id}" class="secondary">Editar</button>
                  <button data-action="delete-event" data-id="${e.id}">Eliminar</button>
                </div>
              </article>`).join('')}
          </div>
        </section>`;
    }

    function bracketsModule() {
      return `
        <section class="admin-panel card">
          <h3>Gestión de brackets</h3>
          <p class="form-help">Ahora los brackets se crean con todas las rondas preparadas y los ganadores avanzan automáticamente.</p>
          <form id="bracket-form">
            <div class="form-grid">
              <input name="name" required placeholder="Nombre bracket" />
              <input name="roundName" required placeholder="Nombre ronda inicial (ej: Cuartos)" />
              <select multiple name="participants" size="6" required>
                ${state.fighters.map(f => `<option value="${f.id}">${f.name} — ${f.category}</option>`).join('')}
              </select>
            </div>
            <button type="submit">Crear bracket</button>
          </form>
          <div id="bracket-msg"></div>
          <div class="list">
            ${state.brackets.map(b => `
              <article class="card">
                <strong>${b.name}</strong>
                <p class="record">${b.isActive ? 'Bracket activo' : 'Bracket inactivo'} · ${b.venue || 'Sin venue'}</p>
                <div class="item-actions">
                  <button data-action="set-active-bracket" data-id="${b.id}" class="secondary">Marcar como activo</button>
                </div>
                ${b.rounds.map((r, ri) => `
                  <div class="match">
                    <p><span class="round-title">${r.name}</span></p>
                    ${r.matches.map((m, mi) => {
                      const f1 = fighterById(m.fighter1Id)?.name || 'Pendiente';
                      const f2 = fighterById(m.fighter2Id)?.name || 'Pendiente';
                      const winnerName = fighterById(m.winnerId)?.name || 'Sin definir';
                      return `<div class="card">
                        <p><strong>${f1}</strong> vs <strong>${f2}</strong></p>
                        <p class="record">Ganador: ${winnerName}</p>
                        <div class="item-actions">
                          ${m.fighter1Id ? `<button data-action="pick-winner" data-bid="${b.id}" data-ri="${ri}" data-mi="${mi}" data-wid="${m.fighter1Id}" class="secondary">Gana ${f1}</button>` : ''}
                          ${m.fighter2Id ? `<button data-action="pick-winner" data-bid="${b.id}" data-ri="${ri}" data-mi="${mi}" data-wid="${m.fighter2Id}" class="secondary">Gana ${f2}</button>` : ''}
                        </div>
                      </div>`;
                    }).join('')}
                  </div>`).join('')}
              </article>`).join('')}
          </div>
        </section>`;
    }

    function adminView() {
      if (!state.ui.isAdmin) return adminLoginView();
      return `
        <section class="admin-shell">
          <aside class="card admin-menu">
            <button class="${state.ui.adminSection==='fighters'?'':'secondary'}" data-action="set-admin-section" data-section="fighters">Boxeadores</button>
            <button class="${state.ui.adminSection==='events'?'':'secondary'}" data-action="set-admin-section" data-section="events">Eventos</button>
            <button class="${state.ui.adminSection==='brackets'?'':'secondary'}" data-action="set-admin-section" data-section="brackets">Brackets</button>
            <button data-action="logout-admin" class="secondary">Salir de admin</button>
          </aside>
          <main>
            ${state.ui.adminSection === 'fighters' ? fightersModule() : ''}
            ${state.ui.adminSection === 'events' ? eventsModule() : ''}
            ${state.ui.adminSection === 'brackets' ? bracketsModule() : ''}
          </main>
        </section>
      `;
    }

    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="topbar">
          <div>
            <p class="label">Spanish Legends · fight-night redesign</p>
            <h1 class="page-title">Spanish <span>Legends</span></h1>
          </div>
          <div class="tabs">
            <button class="tab ${state.ui.activeTab === 'public' ? 'active' : 'secondary'}" data-action="set-tab" data-tab="public">Público</button>
            <button class="tab ${state.ui.activeTab === 'admin' ? 'active' : 'secondary'}" data-action="set-tab" data-tab="admin">Admin</button>
          </div>
        </div>
        ${state.ui.activeTab === 'public' ? publicView() : adminView()}
        <footer>Spanish Legends · estética fight-night, bracket oficial y presencia más cercana al boxeo profesional.</footer>
      `;
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll('[data-action="set-tab"]').forEach(btn => {
        btn.onclick = () => setState(s => ({ ...s, ui: { ...s.ui, activeTab: btn.dataset.tab } }));
      });

      document.querySelectorAll('[data-action="set-admin-section"]').forEach(btn => {
        btn.onclick = () => setState(s => ({ ...s, ui: { ...s.ui, adminSection: btn.dataset.section } }));
      });

      document.querySelectorAll('[data-action="show-fighter-profile"]').forEach(card => {
        card.onclick = () => {
          setState(s => ({ ...s, ui: { ...s.ui, selectedFighterId: card.dataset.id } }));
          requestAnimationFrame(() => {
            document.getElementById('fighter-profile')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
          });
        };
      });

      const adminForm = document.getElementById('admin-login-form');
      if (adminForm) {
        adminForm.onsubmit = (e) => {
          e.preventDefault();
          const pass = new FormData(adminForm).get('password');
          if (pass === state.adminPass) {
            setState(s => ({ ...s, ui: { ...s.ui, isAdmin: true } }));
          } else {
            document.getElementById('admin-login-msg').textContent = 'Clave incorrecta';
          }
        };
      }

      const logoutBtn = document.querySelector('[data-action="logout-admin"]');
      if (logoutBtn) logoutBtn.onclick = () => setState(s => ({ ...s, ui: { ...s.ui, isAdmin: false } }));

      const fighterForm = document.getElementById('fighter-form');
      if (fighterForm) {
        fighterForm.onsubmit = (e) => {
          e.preventDefault();
          const fd = new FormData(fighterForm);
          const payload = Object.fromEntries(fd.entries());
          payload.weight = Number(payload.weight);
          payload.wins = Number(payload.wins);
          payload.losses = Number(payload.losses);
          payload.draws = Number(payload.draws);
          payload.kos = Number(payload.kos);
          const err = validateFighter(payload);
          const msg = document.getElementById('fighter-msg');
          if (err) { msg.className = 'err'; msg.textContent = err; return; }

          setState(s => {
            const fighters = editRefs.fighterId
              ? s.fighters.map(f => f.id === editRefs.fighterId ? { ...f, ...payload } : f)
              : [...s.fighters, { id: uid(), ...payload }];
            editRefs.fighterId = null;
            return {
              ...s,
              fighters,
              brackets: s.brackets.map(b => enrichBracket(b, fighters))
            };
          });
        };
      }

      const cancelFighterEdit = document.getElementById('cancel-fighter-edit');
      if (cancelFighterEdit) cancelFighterEdit.onclick = () => { editRefs.fighterId = null; render(); };

      document.querySelectorAll('[data-action="edit-fighter"]').forEach(btn => btn.onclick = () => {
        editRefs.fighterId = btn.dataset.id;
        render();
      });

      document.querySelectorAll('[data-action="delete-fighter"]').forEach(btn => btn.onclick = () => {
        const fighterId = btn.dataset.id;
        const fighter = fighterById(fighterId);
        const msg = document.getElementById('fighter-msg');
        if (fighterIsUsedInBrackets(fighterId)) {
          if (msg) {
            msg.className = 'err';
            msg.textContent = `No puedes eliminar a ${fighter?.name || 'este boxeador'} porque ya participa en un bracket.`;
          }
          return;
        }
        if (!confirm(`¿Seguro que quieres eliminar a ${fighter?.name || 'este boxeador'}?`)) return;
        setState(s => {
          const fighters = s.fighters.filter(f => f.id !== fighterId);
          const fallbackSelectedId = s.ui.selectedFighterId === fighterId ? (fighters[0]?.id || null) : s.ui.selectedFighterId;
          return {
            ...s,
            fighters,
            ui: { ...s.ui, selectedFighterId: fallbackSelectedId },
            brackets: s.brackets.map(b => enrichBracket(b, fighters))
          };
        });
      });

      const eventForm = document.getElementById('event-form');
      if (eventForm) {
        eventForm.onsubmit = (e) => {
          e.preventDefault();
          const payload = Object.fromEntries(new FormData(eventForm).entries());
          const err = validateEvent(payload);
          const msg = document.getElementById('event-msg');
          if (err) { msg.className = 'err'; msg.textContent = err; return; }

          setState(s => {
            const events = editRefs.eventId
              ? s.events.map(ev => ev.id === editRefs.eventId ? { ...ev, ...payload } : ev)
              : [...s.events, { id: uid(), ...payload }];
            editRefs.eventId = null;
            return { ...s, events };
          });
        };
      }

      const cancelEventEdit = document.getElementById('cancel-event-edit');
      if (cancelEventEdit) cancelEventEdit.onclick = () => { editRefs.eventId = null; render(); };

      document.querySelectorAll('[data-action="edit-event"]').forEach(btn => btn.onclick = () => {
        editRefs.eventId = btn.dataset.id;
        render();
      });

      document.querySelectorAll('[data-action="delete-event"]').forEach(btn => btn.onclick = () => {
        setState(s => ({ ...s, events: s.events.filter(ev => ev.id !== btn.dataset.id) }));
      });

      const bracketForm = document.getElementById('bracket-form');
      if (bracketForm) {
        bracketForm.onsubmit = (e) => {
          e.preventDefault();
          const fd = new FormData(bracketForm);
          const name = String(fd.get('name') || '');
          const roundName = String(fd.get('roundName') || '');
          const participants = fd.getAll('participants').map(String);
          const uniqueParticipants = [...new Set(participants)];
          const msg = document.getElementById('bracket-msg');
          if (!name || !roundName) { msg.className = 'err'; msg.textContent = 'Nombre y ronda son obligatorios'; return; }
          const roundErr = validateRoundSize(uniqueParticipants);
          if (roundErr) { msg.className = 'err'; msg.textContent = roundErr; return; }

          const rounds = buildBracketRounds(uniqueParticipants, roundName);
          propagateBracketForward(rounds, 0);
          setState(s => ({
            ...s,
            brackets: [...s.brackets.map(b => ({ ...b, isActive: false })), {
              id: uid(),
              name,
              season: new Date().getFullYear().toString(),
              venue: 'Venue por definir',
              rounds,
              participantCount: uniqueParticipants.length,
              bracketSize: nextPowerOfTwo(uniqueParticipants.length),
              isActive: true
            }]
          }));
        };
      }

      document.querySelectorAll('[data-action="set-active-bracket"]').forEach(btn => btn.onclick = () => {
        const targetId = btn.dataset.id;
        setState(s => ({
          ...s,
          brackets: s.brackets.map(b => ({ ...b, isActive: b.id === targetId }))
        }));
      });

      document.querySelectorAll('[data-action="pick-winner"]').forEach(btn => btn.onclick = () => {
        const { bid, ri, mi, wid } = btn.dataset;
        setState(s => ({
          ...s,
          brackets: s.brackets.map(b => {
            if (b.id !== bid) return b;
            return updateBracketWinner(b, Number(ri), Number(mi), wid);
          })
        }));
      });
    }

    render();
  </script>
</body>
</html>
